<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>선발 가중치 대시보드</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f6f4;
      --panel: #ffffff;
      --text: #202326;
      --muted: #626970;
      --line: #d9dedb;
      --soft: #eef2ef;
      --accent: #0f8b8d;
      --danger: #c44536;
      --shadow: 0 12px 28px rgba(32, 35, 38, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-width: 320px;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      letter-spacing: 0;
    }

    button,
    input {
      font: inherit;
    }

    .shell {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 36px;
    }

    header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.15;
      font-weight: 800;
    }

    .meta {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      text-align: right;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .controls-panel {
      padding: 18px;
      margin-bottom: 16px;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
    }

    .weight-total {
      min-width: 112px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .weight-total strong {
      color: var(--accent);
      font-size: 18px;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .btn {
      border: 1px solid var(--line);
      background: #ffffff;
      color: var(--text);
      border-radius: 8px;
      padding: 9px 12px;
      cursor: pointer;
      font-weight: 700;
    }

    .btn:hover,
    .btn:focus-visible {
      border-color: var(--accent);
      outline: none;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(5, minmax(130px, 1fr));
      gap: 14px;
    }

    .control {
      min-width: 0;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--soft);
    }

    .control.is-fixed {
      border-color: color-mix(in srgb, var(--accent), #ffffff 55%);
      background: #ffffff;
    }

    .control-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
      font-weight: 800;
      font-size: 14px;
    }

    .control-value {
      color: var(--accent);
      white-space: nowrap;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    input[type="range"]:disabled {
      cursor: not-allowed;
      opacity: 0.5;
    }

    .control-lock {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 10px;
      color: var(--muted);
      cursor: pointer;
      font-size: 13px;
      font-weight: 800;
      user-select: none;
    }

    .control-lock input {
      width: 16px;
      height: 16px;
      margin: 0;
      accent-color: var(--accent);
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 16px;
    }

    .summary-card {
      padding: 14px;
      min-height: 92px;
    }

    .summary-label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .summary-winner {
      margin-top: 8px;
      font-size: 22px;
      font-weight: 900;
      overflow-wrap: anywhere;
    }

    .summary-detail {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
    }

    .groups {
      display: grid;
      gap: 16px;
    }

    .group-card {
      padding: 18px;
    }

    .group-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }

    .group-title {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
    }

    .group-gap {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      text-align: right;
    }

    .candidate-list {
      display: grid;
      gap: 12px;
    }

    .candidate-row {
      display: grid;
      grid-template-columns: minmax(118px, 160px) 1fr minmax(74px, auto);
      align-items: center;
      gap: 12px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
    }

    .candidate-row.is-winner {
      border-color: color-mix(in srgb, var(--row-color), #ffffff 35%);
      background: color-mix(in srgb, var(--row-color), #ffffff 92%);
    }

    .candidate-name {
      min-width: 0;
      font-size: 16px;
      font-weight: 900;
      overflow-wrap: anywhere;
    }

    .candidate-rank {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      width: 26px;
      height: 26px;
      margin-right: 8px;
      border-radius: 50%;
      background: var(--soft);
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      vertical-align: middle;
    }

    .is-winner .candidate-rank {
      background: var(--row-color);
      color: #ffffff;
    }

    .bar-track {
      position: relative;
      width: 100%;
      height: 18px;
      overflow: hidden;
      border-radius: 8px;
      background: #e7ebe8;
    }

    .bar-fill {
      width: 0;
      height: 100%;
      border-radius: 8px;
      background: var(--row-color);
      transition: width 160ms ease;
    }

    .candidate-score {
      text-align: right;
      font-size: 18px;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
    }

    .components-table {
      margin-top: 14px;
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    table {
      width: 100%;
      min-width: 560px;
      border-collapse: collapse;
      font-size: 13px;
    }

    th,
    td {
      padding: 9px 10px;
      border-bottom: 1px solid var(--line);
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    th:first-child,
    td:first-child {
      text-align: left;
      font-weight: 800;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    th {
      background: var(--soft);
      color: var(--muted);
      font-weight: 800;
    }

    .simulation-panel {
      margin-top: 16px;
      margin-bottom: 16px;
      padding: 18px;
    }

    .simulation-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 16px;
    }

    .simulation-title h2 {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
    }

    .simulation-title p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .simulation-controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
    }

    .bound-input {
      display: grid;
      gap: 5px;
      min-width: 90px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .bound-input input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 9px;
      color: var(--text);
      font-weight: 800;
    }

    .simulation-status {
      min-height: 22px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .simulation-kpis {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .simulation-kpi {
      min-width: 0;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--soft);
    }

    .simulation-kpi-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      line-height: 1.3;
    }

    .simulation-kpi-value {
      margin-top: 6px;
      font-size: 22px;
      font-weight: 900;
      overflow-wrap: anywhere;
    }

    .simulation-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1.35fr);
      gap: 14px;
      margin-top: 14px;
    }

    .simulation-box {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: #ffffff;
    }

    .simulation-box h3 {
      margin: 0;
      padding: 11px 12px;
      border-bottom: 1px solid var(--line);
      background: var(--soft);
      font-size: 14px;
    }

    .simulation-list {
      display: grid;
      gap: 10px;
      padding: 12px;
    }

    .sim-row {
      display: grid;
      grid-template-columns: minmax(84px, 120px) 1fr minmax(80px, auto);
      align-items: center;
      gap: 10px;
      font-size: 13px;
    }

    .sim-label {
      min-width: 0;
      font-weight: 900;
      overflow-wrap: anywhere;
    }

    .sim-track {
      height: 12px;
      overflow: hidden;
      border-radius: 8px;
      background: #e7ebe8;
    }

    .sim-fill {
      height: 100%;
      border-radius: 8px;
      background: var(--sim-color, var(--accent));
    }

    .sim-count {
      color: var(--muted);
      text-align: right;
      font-variant-numeric: tabular-nums;
      font-weight: 800;
    }

    .scenario-details {
      margin-top: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
    }

    .scenario-details summary {
      cursor: pointer;
      padding: 12px;
      color: var(--text);
      font-size: 14px;
      font-weight: 900;
    }

    .scenario-table-wrap {
      overflow-x: auto;
      border-top: 1px solid var(--line);
    }

    .empty-note {
      padding: 12px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .warning {
      margin-top: 16px;
      padding: 14px 16px;
      border: 1px solid color-mix(in srgb, var(--danger), #ffffff 55%);
      border-radius: 8px;
      background: color-mix(in srgb, var(--danger), #ffffff 92%);
    }

    .warning-title {
      margin: 0 0 8px;
      color: var(--danger);
      font-weight: 900;
    }

    .warning ul {
      margin: 0;
      padding-left: 18px;
      color: #4a3430;
      font-size: 13px;
      line-height: 1.55;
    }

    @media (max-width: 900px) {
      header,
      .toolbar,
      .group-head,
      .simulation-head {
        align-items: stretch;
        flex-direction: column;
      }

      .meta,
      .group-gap {
        text-align: left;
      }

      .controls,
      .summary-grid,
      .simulation-kpis,
      .simulation-grid {
        grid-template-columns: 1fr;
      }

      .simulation-controls {
        justify-content: flex-start;
      }
    }

    @media (max-width: 640px) {
      .shell {
        width: min(100% - 20px, 1180px);
        padding-top: 18px;
      }

      h1 {
        font-size: 24px;
      }

      .candidate-row {
        grid-template-columns: 1fr;
      }

      .sim-row {
        grid-template-columns: 1fr;
      }

      .sim-count {
        text-align: left;
      }

      .candidate-score {
        text-align: left;
      }
    }
  </style>
</head>

    function clampWeight(value) {
      const parsed = Number(value);
      if (!Number.isFinite(parsed)) return 0;
      return Math.max(0, Math.min(100, Math.round(parsed)));
    }

    function distributeRemainder(changedKey, changedValue) {
      const next = { ...weights };
      const fixedRest = componentKeys.filter((key) => key !== changedKey && fixedWeights[key]);
      const adjustableRest = componentKeys.filter((key) => key !== changedKey && !fixedWeights[key]);
      const fixedRestTotal = fixedRest.reduce((sum, key) => sum + weights[key], 0);
      const maxChanged = Math.max(0, 100 - fixedRestTotal);

      next[changedKey] = Math.min(clampWeight(changedValue), maxChanged);
      const remaining = 100 - fixedRestTotal - next[changedKey];

      if (adjustableRest.length === 0) {
        next[changedKey] = maxChanged;
        weights = next;
        return;
      }

      const oldTotal = adjustableRest.reduce((sum, key) => sum + weights[key], 0);
      const exact = adjustableRest.map((key) =>
        oldTotal > 0 ? (weights[key] / oldTotal) * remaining : remaining / adjustableRest.length

      let leftover = remaining - floors.reduce((sum, value) => sum + value, 0);
      const order = exact
        .map((value, index) => ({ index, fraction: value - Math.floor(value) }))
        .sort((a, b) => b.fraction - a.fraction);

      let pointer = 0;
      while (leftover > 0) {
        floors[order[pointer % order.length].index] += 1;
        leftover -= 1;
        pointer += 1;
      }

      adjustableRest.forEach((key, index) => {
        next[key] = floors[index];
      });
      weights = next;
    }

    function setWeights(nextWeights, options = {}) {

    function playerScore(playerName) {
      const scores = DATA.players[playerName].scores;
      return componentKeys.reduce((sum, key) => sum + scores[key] * weights[key] / 100, 0);

    function scenarioScore(playerName, scenarioWeights) {
      const scores = DATA.players[playerName].scores;
      return scenarioWeights.reduce((sum, weight, index) => {
        return sum + scores[componentKeys[index]] * weight / 100;
      }, 0);
    }

    function scenarioGroupResult(group, scenarioWeights) {

        .map((playerName) => ({

        .sort((a, b) => b.score - a.score || a.name.localeCompare(b.name));

      const ranked = group.players
        .map((playerName) => ({
          name: playerName,
          score: playerScore(playerName),
          color: DATA.players[playerName].color,
          scores: DATA.players[playerName].scores,
        }))
        .sort((a, b) => b.score - a.score);
      const gap = ranked.length > 1 ? ranked[0].score - ranked[1].score : 0;
      return { ranked, winner: ranked[0], gap };
    }

    function renderControls() {
      controlsEl.replaceChildren();
      DATA.components.forEach((component) => {
        const wrap = document.createElement("div");
        wrap.className = "control";
        wrap.id = `control-${component.key}`;

        const head = document.createElement("div");
        head.className = "control-head";

        const label = document.createElement("label");
        label.htmlFor = `weight-${component.key}`;
        label.textContent = component.label;

        const value = document.createElement("span");
        value.className = "control-value";
        value.id = `value-${component.key}`;

        const input = document.createElement("input");
        input.id = `weight-${component.key}`;
        input.type = "range";
        input.min = "0";
        input.max = "100";
        input.step = "1";
        input.setAttribute("aria-label", `${component.label} 가중치`);
        input.addEventListener("input", (event) => {
          distributeRemainder(component.key, event.target.value);
          update();
        });

        const lockLabel = document.createElement("label");
        lockLabel.className = "control-lock";
        lockLabel.htmlFor = `lock-${component.key}`;

        const lock = document.createElement("input");
        lock.id = `lock-${component.key}`;
        lock.type = "checkbox";
        lock.setAttribute("aria-label", `${component.label} 가중치 고정`);
        lock.addEventListener("change", (event) => {
          fixedWeights[component.key] = event.target.checked;
          update();
        });

        const lockText = document.createElement("span");
        lockText.textContent = "고정";
        lockLabel.append(lock, lockText);

        head.append(label, value);
        wrap.append(head, input, lockLabel);
        controlsEl.append(wrap);
      });
    }

    function renderStaticGroups() {
      groupsEl.replaceChildren();
      DATA.groups.forEach((group) => {
        const section = document.createElement("section");
        section.className = "panel group-card";
        section.id = `group-${group.key}`;

        const head = document.createElement("div");
        head.className = "group-head";

        const title = document.createElement("h2");
        title.className = "group-title";
        title.textContent = group.label;

        const gap = document.createElement("div");
        gap.className = "group-gap";
        gap.id = `gap-${group.key}`;

        const list = document.createElement("div");
        list.className = "candidate-list";
        list.id = `list-${group.key}`;

        const tableWrap = document.createElement("div");
        tableWrap.className = "components-table";

        const table = document.createElement("table");
        table.id = `table-${group.key}`;

        head.append(title, gap);
        tableWrap.append(table);
        section.append(head, list, tableWrap);
        groupsEl.append(section);
      });
    }

    function renderSummary(resultsByGroup) {
      summaryEl.replaceChildren();
      DATA.groups.forEach((group) => {
        const result = resultsByGroup[group.key];
        const card = document.createElement("article");
        card.className = "panel summary-card";

        const label = document.createElement("div");
        label.className = "summary-label";
        label.textContent = group.label;

        const winner = document.createElement("div");
        winner.className = "summary-winner";
        winner.style.color = result.winner.color;
        winner.textContent = result.winner.name;

        const detail = document.createElement("div");
        detail.className = "summary-detail";
        detail.textContent = `${formatScore.format(result.winner.score)}점 · 차이 ${formatScore.format(result.gap)}점`;

        card.append(label, winner, detail);
        summaryEl.append(card);
      });
    }

    function renderCandidateList(group, result) {
      const list = document.getElementById(`list-${group.key}`);
      list.replaceChildren();

      result.ranked.forEach((candidate, index) => {
        const row = document.createElement("div");
        row.className = `candidate-row${index === 0 ? " is-winner" : ""}`;
        row.style.setProperty("--row-color", candidate.color);

        const name = document.createElement("div");
        name.className = "candidate-name";

        const rank = document.createElement("span");
        rank.className = "candidate-rank";
        rank.textContent = String(index + 1);

        const nameText = document.createElement("span");
        nameText.textContent = candidate.name;
        name.append(rank, nameText);

        const track = document.createElement("div");
        track.className = "bar-track";
        const fill = document.createElement("div");
        fill.className = "bar-fill";
        fill.style.width = `${Math.max(0, Math.min(100, candidate.score))}%`;
        track.append(fill);

        const score = document.createElement("div");
        score.className = "candidate-score";
        score.textContent = formatScore.format(candidate.score);

        row.append(name, track, score);
        list.append(row);
      });
    }

    function renderComponentTable(group, result) {
      const table = document.getElementById(`table-${group.key}`);
      table.replaceChildren();

      const thead = document.createElement("thead");
      const headerRow = document.createElement("tr");
      ["선수", ...DATA.components.map((component) => component.label), "총점"].forEach((label) => {
        const th = document.createElement("th");
        th.textContent = label;
        headerRow.append(th);
      });
      thead.append(headerRow);

      const tbody = document.createElement("tbody");
      result.ranked.forEach((candidate) => {
        const tr = document.createElement("tr");
        const playerCell = document.createElement("td");
        playerCell.textContent = candidate.name;
        tr.append(playerCell);

        DATA.components.forEach((component) => {
          const td = document.createElement("td");
          const raw = candidate.scores[component.key];
          const contribution = raw * weights[component.key] / 100;
          td.textContent = `${formatScore.format(raw)} / ${formatScore.format(contribution)}`;
          tr.append(td);
        });

        const total = document.createElement("td");
        total.textContent = formatScore.format(candidate.score);
        tr.append(total);
        tbody.append(tr);
      });

      table.append(thead, tbody);
    }

    function renderWarnings() {
      document.getElementById("warning-title").textContent = DATA.botWarning;
      const list = document.getElementById("warnings");
      list.replaceChildren();
      DATA.validation.forEach((item) => {
        const li = document.createElement("li");
        li.textContent = `${item.area}: ${item.finding}`;
        list.append(li);
      });
    }

    function formatPercent(count, total) {
      if (!total) return "0%";
      const value = count / total * 100;
      if (value > 0 && value < 0.01) return `${value.toFixed(4)}%`;
      return `${value.toFixed(2)}%`;
    }

    function renderSimulationEmpty() {
      simulationKpisEl.replaceChildren();
      simulationPositionEl.replaceChildren();
      simulationCombosEl.replaceChildren();
      gumayusiTableEl.replaceChildren();

      [simulationPositionEl, simulationCombosEl, gumayusiTableEl].forEach((target) => {
        const note = document.createElement("div");
        note.className = "empty-note";
        note.textContent = "시뮬레이션 실행 후 결과가 표시됩니다.";
        target.append(note);
      });
    }

    function renderKpi(label, value) {
      const card = document.createElement("article");
      card.className = "simulation-kpi";

      const labelEl = document.createElement("div");
      labelEl.className = "simulation-kpi-label";
      labelEl.textContent = label;

      const valueEl = document.createElement("div");
      valueEl.className = "simulation-kpi-value";
      valueEl.textContent = value;

      card.append(labelEl, valueEl);
      simulationKpisEl.append(card);
    }

    function renderSimulationRows(target, rows, total) {
      target.replaceChildren();
      if (!rows.length) {
        const note = document.createElement("div");
        note.className = "empty-note";
        note.textContent = "해당 조건에서 결과가 없습니다.";
        target.append(note);
        return;
      }

      rows.forEach((row) => {
        const item = document.createElement("div");
        item.className = "sim-row";

        const label = document.createElement("div");
        label.className = "sim-label";
        label.textContent = row.label;

        const track = document.createElement("div");
        track.className = "sim-track";
        const fill = document.createElement("div");
        fill.className = "sim-fill";
        fill.style.width = `${total ? row.count / total * 100 : 0}%`;
        if (row.color) fill.style.setProperty("--sim-color", row.color);
        track.append(fill);

        const count = document.createElement("div");
        count.className = "sim-count";
        count.textContent = `${formatCount.format(row.count)} · ${formatPercent(row.count, total)}`;

        item.append(label, track, count);
        target.append(item);
      });
    }

    function renderGumayusiTable(result) {
      gumayusiTableEl.replaceChildren();
      gumayusiSummaryEl.textContent =
        `구마유시 1위 시나리오 ${formatCount.format(result.gumayusiBotWins)}개`;

      if (!result.gumayusiRows.length) {
        const note = document.createElement("div");
        note.className = "empty-note";
        note.textContent = "해당 조건에서 구마유시가 원딜 1위인 시나리오가 없습니다.";
        gumayusiTableEl.append(note);
        return;
      }

      const table = document.createElement("table");
      const thead = document.createElement("thead");
      const header = document.createElement("tr");
      ["리그", "월즈", "KeSPA", "All-Pro", "POG/POM", "Top", "Jungle", "원딜차", "Gumayusi", "Peyz", "Viper"].forEach((text) => {
        const th = document.createElement("th");
        th.textContent = text;
        header.append(th);
      });
      thead.append(header);

      const tbody = document.createElement("tbody");
      result.gumayusiRows.forEach((row) => {
        const tr = document.createElement("tr");
        [
          ...row.weights,
          row.topWinner,
          row.jungleWinner,
          formatScore.format(row.botGap),
          formatScore.format(row.gumayusiScore),
          formatScore.format(row.peyzScore),
          formatScore.format(row.viperScore),
        ].forEach((value) => {
          const td = document.createElement("td");
          td.textContent = String(value);
          tr.append(td);
        });
        tbody.append(tr);
      });

      table.append(thead, tbody);
      gumayusiTableEl.append(table);

      if (result.gumayusiBotWins > result.gumayusiRows.length) {
        const note = document.createElement("div");
        note.className = "empty-note";
        note.textContent = `화면에는 상위 ${formatCount.format(result.gumayusiRows.length)}개만 표시합니다.`;
        gumayusiTableEl.append(note);
      }
    }

    function calculateScenarios(minWeight, maxWeight) {
      const positionCounts = Object.fromEntries(
        DATA.groups.map((group) => [group.key, Object.fromEntries(group.players.map((player) => [player, 0]))])
      );
      const comboCounts = new Map();
      const gumayusiRows = [];
      const weightsBuffer = [];
      const selectedTarget = { top: "Zeus", jungle: "Canyon", bot: "Gumayusi" };
      let total = 0;
      let selectedWins = 0;
      let gumayusiBotWins = 0;

      function recordScenario(scenarioWeights) {
        total += 1;
        const results = Object.fromEntries(
          DATA.groups.map((group) => [group.key, scenarioGroupResult(group, scenarioWeights)])
        );
        DATA.groups.forEach((group) => {
          positionCounts[group.key][results[group.key].winner.name] += 1;
        });

        const combo = DATA.groups.map((group) => results[group.key].winner.name).join(" / ");
        comboCounts.set(combo, (comboCounts.get(combo) || 0) + 1);

        if (
          results.top?.winner.name === selectedTarget.top &&
          results.jungle?.winner.name === selectedTarget.jungle &&
          results.bot?.winner.name === selectedTarget.bot
        ) {
          selectedWins += 1;
        }

        if (results.bot?.winner.name === "Gumayusi") {
          gumayusiBotWins += 1;
          const gumayusiRow = {
            weights: [...scenarioWeights],
            topWinner: results.top?.winner.name || "",
            jungleWinner: results.jungle?.winner.name || "",
            botGap: results.bot.gap,
            gumayusiScore: scenarioScore("Gumayusi", scenarioWeights),
            peyzScore: scenarioScore("Peyz", scenarioWeights),
            viperScore: scenarioScore("Viper", scenarioWeights),
          };

          if (gumayusiRows.length < 200) {
            gumayusiRows.push(gumayusiRow);
          } else {
            let weakestIndex = 0;
            for (let index = 1; index < gumayusiRows.length; index += 1) {
              if (gumayusiRows[index].botGap < gumayusiRows[weakestIndex].botGap) {
                weakestIndex = index;
              }
            }
            if (gumayusiRow.botGap > gumayusiRows[weakestIndex].botGap) {
              gumayusiRows[weakestIndex] = gumayusiRow;
            }
          }
        }
      }

      function enumerate(index, remaining) {
        if (index === componentKeys.length - 1) {
          if (remaining >= minWeight && remaining <= maxWeight) {
            weightsBuffer[index] = remaining;
            recordScenario([...weightsBuffer]);
          }
          return;
        }

        const slotsLeft = componentKeys.length - index - 1;
        const low = Math.max(minWeight, remaining - slotsLeft * maxWeight);
        const high = Math.min(maxWeight, remaining - slotsLeft * minWeight);
        for (let value = low; value <= high; value += 1) {
          weightsBuffer[index] = value;
          enumerate(index + 1, remaining - value);
        }
      }

      enumerate(0, 100);
      gumayusiRows.sort((a, b) => b.botGap - a.botGap);
      return { total, selectedWins, gumayusiBotWins, positionCounts, comboCounts, gumayusiRows };
    }

    function renderSimulation(result, minWeight, maxWeight, elapsedMs) {
      simulationStatusEl.textContent =
        `조건: 각 지표 ${minWeight}-${maxWeight}% · 1% 단위 · 계산 ${elapsedMs.toFixed(0)}ms`;

      simulationKpisEl.replaceChildren();
      renderKpi("전체 시나리오", formatCount.format(result.total));
      renderKpi("Zeus/Canyon/Gumayusi", formatCount.format(result.selectedWins));
      renderKpi("Gumayusi 원딜 1위", formatCount.format(result.gumayusiBotWins));
      renderKpi("Peyz 원딜 1위", formatCount.format(result.positionCounts.bot?.Peyz || 0));

      const positionRows = [];
      DATA.groups.forEach((group) => {
        group.players.forEach((player) => {
          positionRows.push({
            label: `${group.label} · ${player}`,
            count: result.positionCounts[group.key][player] || 0,
            color: DATA.players[player].color,
          });
        });
      });
      positionRows.sort((a, b) => b.count - a.count || a.label.localeCompare(b.label));
      renderSimulationRows(simulationPositionEl, positionRows, result.total);

      const comboRows = Array.from(result.comboCounts.entries())
        .map(([label, count]) => ({ label, count }))
        .sort((a, b) => b.count - a.count || a.label.localeCompare(b.label));
      renderSimulationRows(simulationCombosEl, comboRows, result.total);
      renderGumayusiTable(result);
    }

    function runSimulation() {
      const minWeight = clampWeight(simulationMinEl.value);
      const maxWeight = clampWeight(simulationMaxEl.value);
      simulationMinEl.value = String(minWeight);
      simulationMaxEl.value = String(maxWeight);

      if (minWeight > maxWeight) {
        simulationStatusEl.textContent = "최저값이 최고값보다 큽니다.";
        return;
      }
      if (minWeight * componentKeys.length > 100 || maxWeight * componentKeys.length < 100) {
        simulationStatusEl.textContent = "합계 100%를 만들 수 없는 범위입니다.";
        return;
      }

      simulationRunEl.disabled = true;
      simulationRunEl.textContent = "계산 중";
      simulationStatusEl.textContent = "시나리오를 계산하고 있습니다.";

      window.setTimeout(() => {
        const startedAt = performance.now();
        const result = calculateScenarios(minWeight, maxWeight);
        renderSimulation(result, minWeight, maxWeight, performance.now() - startedAt);
        simulationRunEl.disabled = false;
        simulationRunEl.textContent = "시뮬레이션 실행";
      }, 0);
    }

    function updateControls() {
      DATA.components.forEach((component) => {
        const wrap = document.getElementById(`control-${component.key}`);
        const input = document.getElementById(`weight-${component.key}`);
        const value = document.getElementById(`value-${component.key}`);
        const lock = document.getElementById(`lock-${component.key}`);
        input.value = String(weights[component.key]);
        input.disabled = fixedWeights[component.key];
        value.textContent = `${weights[component.key]}%`;
        lock.checked = fixedWeights[component.key];
        wrap.classList.toggle("is-fixed", fixedWeights[component.key]);
      });
      const total = componentKeys.reduce((sum, key) => sum + weights[key], 0);
      totalEl.textContent = `${total}%`;
    }

    function update() {
      updateControls();
      const resultsByGroup = {};
      DATA.groups.forEach((group) => {
        const result = groupResult(group);
        resultsByGroup[group.key] = result;
        document.getElementById(`gap-${group.key}`).textContent =
          `${result.winner.name} 우세 · ${formatScore.format(result.gap)}점 차`;
        renderCandidateList(group, result);
        renderComponentTable(group, result);
      });
      renderSummary(resultsByGroup);
    }

    document.getElementById("reset-default").addEventListener("click", () => {
      setWeights(DATA.defaultWeights);
    });

    document.getElementById("reset-even").addEventListener("click", () => {
      setWeights(Object.fromEntries(componentKeys.map((key) => [key, 20])));
    });
    simulationRunEl.addEventListener("click", runSimulation);

    document.getElementById("generated-at").textContent = `생성: ${DATA.generatedAt}`;
    renderControls();
    renderStaticGroups();
    renderWarnings();
    renderSimulationEmpty();
    update();
  </script>
</body>
